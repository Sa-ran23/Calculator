<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Calculator</title>
    <link rel="stylesheet" href="calc_style.css">
</head>
<body>
    <div class="cal_box">
        <input type="text" class="display" id="dis" readonly value="">
       <div class="cal_button">
         <div class="first">
            <button type="button" class="f_row" onclick="clearAll();">AC</button>
            <button type="button" class="f_row" onclick="backSpace();"><i class="fa-solid fa-delete-left" style="color: white;"></i></button>
            <button type="button" class="f_row" onclick="calc('%');">%</button>
            <button type="button" class="f_row" onclick="calc('/');">/</button>
        </div>
        <div class="second">
            <button type="button" class="f_row" onclick="calc(7);">7</button>
            <button type="button" class="f_row" onclick="calc(8);">8</button>
            <button type="button" class="f_row" onclick="calc(9);">9</button>
            <button type="button" class="f_row" onclick="calc('*');">x</button>
        </div>
        <div class="third">
            <button type="button" class="t_row" onclick="calc(4);">4</button>
            <button type="button" class="t_row" onclick="calc(5);">5</button>
            <button type="button" class="t_row" onclick="calc(6);">6</button>
            <button type="button" class="t_row" onclick="calc('-');">-</button>
        </div>
        <div class="four">
            <button type="button" class="f_row" onclick="calc(1);">1</button>
            <button type="button" class="f_row" onclick="calc(2);">2</button>
            <button type="button" class="f_row" onclick="calc(3);">3</button>
            <button type="button" class="f_row" onclick="calc('+');">+</button>
        </div>
        <div class="five">
            <button type="button" class="fi_row" onclick="clearAll();"><i class="fa-solid fa-arrows-rotate" style="color: white;"></i></button>
            <button type="button" class="fi_row" onclick="calc(0);">0</button>
            <button type="button" class="fi_row" onclick="calc('.');">.</button>
            <button type="button" class="fi_row" onclick="calculate_ans();">=</button>
        </div>
       </div>
    </div>
</body>
<script>
    
function calc(val) {
    const display = document.getElementById("dis");
    display.value += val;
}

function clearAll() {
    document.getElementById("dis").value = "";
}

function backSpace() {
    const display = document.getElementById("dis");
    display.value = display.value.slice(0, -1);
}

function calculate_ans() {
    const display = document.getElementById("dis");
    try {
        if (!display.value.trim()) {
            return;
        }
        display.value = eval(display.value);
    } catch (error) {
        display.value = "Error";
    }
}
</script>
</html>
